name: GitHub-Profile-3D-Contrib

on:
  schedule: # Runs at 18:00 UTC (you can change this time)
    - cron: "0 18 * * *"
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@0.8.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Match GitHub Themes and Add Container
        run: |
          python -c "import glob, re; [open(f, 'w', encoding='utf-8').write(re.sub(r'<rect x=\"0\" y=\"0\" width=\"1280\" height=\"850\" fill=\"#00000f\"></rect>', r'<rect x=\"0\" y=\"0\" width=\"1280\" height=\"850\" fill=\"#161b22\" rx=\"15\" stroke=\"#616e7f\" stroke-width=\"2\"></rect>', open(f, encoding='utf-8').read())) for f in glob.glob('profile-3d-contrib/*.svg')]"
          python -c "import glob, re; [open(f, 'w', encoding='utf-8').write(re.sub(r'<rect x=\"0\" y=\"0\" width=\"1280\" height=\"850\" fill=\"#ffffff\"></rect>', r'<rect x=\"0\" y=\"0\" width=\"1280\" height=\"850\" fill=\"#f6f8fa\" rx=\"15\" stroke=\"#c2cfde\" stroke-width=\"2\"></rect>', open(f, encoding='utf-8').read())) for f in glob.glob('profile-3d-contrib/*.svg')]"
      - name: Validate Generated SVGs (restore backup if empty)
        run: |
          EMPTY=0
          for f in profile-3d-contrib/*.svg; do
            SIZE=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$SIZE" -lt 1000 ]; then
              echo "WARNING: $f is empty or too small ($SIZE bytes) — restoring from backup"
              EMPTY=1
            fi
          done
          if [ "$EMPTY" -eq 1 ]; then
            echo "Restoring all SVGs from backup folder..."
            cp backup/profile-3d-contrib/*.svg profile-3d-contrib/
            echo "Restored from backup successfully."
          else
            echo "All SVGs look valid. Proceeding with generated files."
          fi
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "generated"; then
            git push
          fi
